id: US-020
title: Implement JWT Authentication System
description: >
  As an application user, I want to securely register, log in, refresh
  my session, and log out using JWT tokens so that my identity is
  verified and my data is protected from unauthorised access.

category: code_generation
difficulty: advanced
tags:
  - auth
  - jwt
  - security
  - api
  - testing

prompt_file: prompts/advanced/US020_implement_auth.md
gherkin_file: gherkin/advanced/US020_implement_auth.feature

target_files:
  - app/routers/auth.py
  - app/schemas/auth.py
  - app/services/auth_service.py
  - app/models/user.py
  - app/dependencies/auth.py
  - tests/test_auth.py

expected_files_created:
  - app/routers/auth.py
  - app/schemas/auth.py
  - app/services/auth_service.py
  - app/dependencies/auth.py
  - tests/test_auth.py

expected_files_modified:
