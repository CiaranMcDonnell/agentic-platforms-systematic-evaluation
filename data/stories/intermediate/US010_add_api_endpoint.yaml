id: US-010
title: Add REST API Endpoint for User Profiles
description: >
  As an application user, I want to view and update my profile
  information through the API so that I can manage my display name,
  bio, and avatar without needing direct database access.

category: code_generation
difficulty: intermediate
tags:
  - api
  - rest
  - fastapi
  - pydantic
  - testing

prompt_file: prompts/intermediate/US010_add_api_endpoint.md
gherkin_file: gherkin/intermediate/US010_add_api_endpoint.feature

target_files:
  - app/routers/profiles.py
  - app/schemas/profile.py
  - tests/test_profiles.py

expected_files_created:
  - app/routers/profiles.py
  - app/schemas/profile.py
  - tests/test_profiles.py

expected_files_modified:
  - app/main.py

acceptance_criteria:
  - id: AC-010-1
    description: GET endpoint returns profile for valid user
    verification_method: test

  - id: AC-010-2
    description: GET endpoint returns 404 for unknown user
    verification_method: test

  - id: AC-010-3
    description: PUT endpoint updates profile
    verification_method: test

  - id: AC-010-4
    description: Pydantic validation rejects invalid input
    verification_method: test

time_budget_seconds: 1200
max_iterations: 40

version: "1.0"
author: Ciaran McDonnell
