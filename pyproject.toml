[project]
name = "desmet-agentic-evaluation"
version = "1.0.0"
description = "DESMET-based evaluation framework for agentic platforms"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = { text = "MIT" }
authors = [
    { name = "Ciaran McDonnell", email = "ciaran.mcdonnell@ucdconnect.ie" }
]
keywords = ["agents", "llm", "evaluation", "desmet", "agentic"]

dependencies = [
    # Core evaluation framework
    "pyyaml>=6.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.25.0",
    "aiofiles>=23.0.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "python-dotenv>=1.0.0",
    # Data handling
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    # Metrics and analysis
    "scikit-learn>=1.3.0",
    # Logging and tracing
    "structlog>=23.0.0",
    # PlantUML rendering
    "plantuml>=0.3.0",
]

[project.optional-dependencies]
# ── SDK / framework platforms (pip-installable, used as Python imports) ──
langgraph = [
    "langgraph>=0.3.0",
    "langgraph-sdk>=0.1.0",
    "langgraph-checkpoint>=2.0.0",
    "langchain-core>=0.2.0",
    "langchain-openai>=0.1.0",
    "langchain-anthropic>=0.1.0",
]
crewai = [
    "crewai>=0.80.0",
    "crewai[tools]",
]
autogen = [
    "autogen-agentchat>=0.4.0",
    "autogen-ext[openai]>=0.4.0",
]
openai-agents = [
    "openai-agents>=0.5.0",
]
google-adk = [
    "google-adk>=1.0.0",
]
semantic-kernel = [
    "semantic-kernel>=1.30.0",
]

# ── Visual/workflow platforms ──
# These run as Docker services and are evaluated via their HTTP APIs.
# Install only if running LangFlow locally (conflicts with other extras):
langflow = [
    "langflow>=1.5.0",
]
# Flowise, Dify, n8n — Docker-only, no Python deps needed.

# ── Observability ──
observability = [
    "langfuse>=2.0.0",
]

# ── Dashboard ──
dashboard = [
    "streamlit>=1.30.0",
    "plotly>=5.18.0",
    "kaleido>=0.2.1",
]

[dependency-groups]
dev = [
    "ruff>=0.1.0",
    "mypy>=1.5.0",
    "pre-commit>=3.4.0",
    "ipython>=8.0.0",
    "jupyter>=1.0.0",
]
test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
desmet-eval = "desmet.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/desmet"]

# ── uv ──────────────────────────────────────────────────────────────────────

[tool.uv]
# Many platform SDKs pin conflicting transitive dependency versions (especially
# pydantic, openai, litellm). Each platform extra is intended to be installed in
# isolation — pick ONE per virtual-env. Declare all known conflicts so uv can
# resolve the base dependencies without trying to unify incompatible extras.
conflicts = [
    # langflow conflicts with every other SDK extra
    [{ extra = "langflow" }, { extra = "langgraph" }],
    [{ extra = "langflow" }, { extra = "crewai" }],
    [{ extra = "langflow" }, { extra = "autogen" }],
    [{ extra = "langflow" }, { extra = "openai-agents" }],
    [{ extra = "langflow" }, { extra = "google-adk" }],
    [{ extra = "langflow" }, { extra = "semantic-kernel" }],
    # openai-agents requires pydantic>=2.12.3; semantic-kernel requires <2.12
    [{ extra = "openai-agents" }, { extra = "semantic-kernel" }],
]

# ── Tool config ─────────────────────────────────────────────────────────────

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_ignores = true
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --cov=src/desmet --cov-report=html -W ignore::pytest.PytestCollectionWarning"

[tool.coverage.run]
source = ["src/desmet"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
